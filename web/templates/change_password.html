{% extends "base.html" %}
{% block title %}PASSKEY UPDATE // GODZILLA{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <div class="breadcrumb-mono">SYSTEM / ACCOUNT / SECURITY</div>
        <h2>CHANGE PASSKEY</h2>
    </div>
</div>

<div class="card" style="padding: 32px; max-width: 520px;">
    <div class="breadcrumb-mono" style="margin-bottom: 20px;">CREDENTIALS UPDATE</div>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">◦ Current Passkey</label>
            <input type="password" name="current_password" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">◦ New Passkey</label>
            <input type="password" name="new_password" class="form-control" minlength="6" required>
            <small class="font-mono" style="font-size: 10px; color: var(--text-muted); display: block; margin-top: 6px;">
                // Minimum 6 characters
            </small>
        </div>
        <div class="mb-4">
            <label class="form-label">◦ Confirm New Passkey</label>
            <input type="password" name="confirm_password" class="form-control" minlength="6" required>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-godzilla">
                <i class="bi bi-shield-lock-fill"></i> UPDATE PASSKEY
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-primary">CANCEL</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Change Password — GODZILLA{% endblock %}

{% block content %}
<h2><i class="bi bi-key"></i> Change Password</h2>

<div class="card p-4" style="max-width: 500px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control bg-dark text-light" required>
        </div>
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control bg-dark text-light"
                   minlength="6" required>
            <small class="text-muted">Minimum 6 characters</small>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control bg-dark text-light"
                   minlength="6" required>
        </div>
        <button type="submit" class="btn btn-godzilla fw-bold">
            <i class="bi bi-check-circle"></i> Change Password
        </button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
